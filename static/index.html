<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Remote</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-page="index">
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fab fa-android"></i>
                <h1>Android Remote</h1>
            </div>
            <div class="header-center">
                <select class="device-dropdown" id="deviceDropdown">
                    <option value="">选择设备</option>
                </select>
                <a href="devices.html" class="manage-devices-link" id="manageDevicesLink">
                    <i class="fas fa-cog"></i>
                    管理设备
                </a>
            </div>
            <div class="header-right">
                <div class="lang-selector">
                    <select class="lang-select" id="langSelect">
                        <option value="zh">🇨🇳 中文</option>
                        <option value="en">🇺🇸 English</option>
                    </select>
                </div>
                <div class="status" id="deviceStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">未连接</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <section class="screenshot-section">
                <div class="screenshot-controls">
                    <div class="screenshot-header">
                        <button id="screenshotBtn" class="btn btn-primary">
                            <i class="fas fa-camera"></i>
                            获取屏幕
                        </button>
                        <label class="toggle-label">
                            <input type="checkbox" id="clickToTap" checked>
                            <span id="clickToTapLabel">点击屏幕直接触摸</span>
                        </label>
                        <label class="toggle-label">
                            <input type="checkbox" id="syncActionRefresh" checked>
                            <span id="syncActionRefreshLabel">同步操作刷新屏幕</span>
                        </label>
                    </div>
                    <div class="screenshot-preview" id="screenshotPreview">
                        <img id="screenshotImage" src="" alt="屏幕预览" style="display: none;">
                        <div class="placeholder" id="screenshotPlaceholder">
                            <i class="fas fa-image"></i>
                            <span>屏幕画面将显示在这里</span>
                        </div>
                        <div class="click-indicator" id="clickIndicator"></div>
                    </div>
                </div>
            </section>

            <div class="controls-grid">
                <div class="swipe-panels" id="swipePanels">
                    <div class="swipe-panel" data-panel="0">
                        <section class="control-section system-controls">
                            <h2 class="section-title">系统与导航</h2>
                            <div class="nav-controls">
                                <button class="btn btn-icon" data-key="back" title="返回">
                                    <i class="fas fa-arrow-left"></i>
                                </button>
                                <div class="dpad">
                                    <button class="btn btn-icon" data-key="up" title="上">
                                        <i class="fas fa-chevron-up"></i>
                                    </button>
                                    <button class="btn btn-icon btn-center" data-key="center" title="确认">
                                        <i class="fas fa-circle"></i>
                                    </button>
                                    <button class="btn btn-icon" data-key="down" title="下">
                                        <i class="fas fa-chevron-down"></i>
                                    </button>
                                    <button class="btn btn-icon" data-key="left" title="左">
                                        <i class="fas fa-chevron-left"></i>
                                    </button>
                                    <button class="btn btn-icon" data-key="right" title="右">
                                        <i class="fas fa-chevron-right"></i>
                                    </button>
                                </div>
                                <button class="btn btn-icon" data-key="home" title="主页">
                                    <i class="fas fa-home"></i>
                                </button>
                            </div>
                            <div class="extra-nav">
                                <button class="btn btn-small" data-key="menu" title="菜单">
                                    <i class="fas fa-bars"></i>
                                    菜单
                                </button>
                                <button class="btn btn-small" data-key="search" title="搜索">
                                    <i class="fas fa-search"></i>
                                    搜索
                                </button>
                            </div>

                            <div class="control-divider"></div>

                            <div class="power-section-group">
                                <div class="power-controls">
                                    <button class="btn btn-small" data-key="brightnessdown" title="亮度减">
                                        <i class="fas fa-moon"></i>
                                        亮度-
                                    </button>
                                    <button class="btn btn-power" data-key="power" title="电源">
                                        <i class="fas fa-power-off"></i>
                                    </button>
                                    <button class="btn btn-small" data-key="brightnessup" title="亮度增">
                                        <i class="fas fa-sun"></i>
                                        亮度+
                                    </button>
                                </div>
                            </div>
                        </section>
                    </div>

                    <div class="swipe-panel" data-panel="1">
                        <div class="media-input-wrapper">
                            <section class="control-section media">
                                <h2 class="section-title">媒体控制</h2>
                                <div class="media-section-group">
                                    <div class="media-controls">
                                        <button class="btn btn-icon" data-key="previous" title="上一曲">
                                            <i class="fas fa-step-backward"></i>
                                        </button>
                                        <button class="btn btn-icon btn-play" data-key="playpause" title="播放/暂停">
                                            <i class="fas fa-play"></i>
                                        </button>
                                        <button class="btn btn-icon" data-key="next" title="下一曲">
                                            <i class="fas fa-step-forward"></i>
                                        </button>
                                    </div>
                                    <div class="volume-controls">
                                        <button class="btn btn-icon" data-key="volumedown" title="音量减">
                                            <i class="fas fa-volume-down"></i>
                                        </button>
                                        <button class="btn btn-icon" data-key="mute" title="静音">
                                            <i class="fas fa-volume-mute"></i>
                                        </button>
                                        <button class="btn btn-icon" data-key="volumeup" title="音量加">
                                            <i class="fas fa-volume-up"></i>
                                        </button>
                                    </div>
                                </div>
                            </section>

                            <section class="control-section input">
                                <h2 class="section-title">文本输入</h2>
                                <div class="input-controls">
                                    <input type="text" id="textInput" placeholder="输入要发送的文本..." class="input-field">
                                    <button id="sendTextBtn" class="btn btn-primary">
                                        <i class="fas fa-paper-plane"></i>
                                        发送
                                    </button>
                                </div>
                            </section>
                        </div>

                        <section class="control-section apps">
                            <h2 class="section-title">应用管理</h2>
                            <div class="app-controls">
                                <div class="app-input-row">
                                    <input type="text" id="packageName" placeholder="应用包名" class="input-field">
                                    <button id="startAppBtn" class="btn btn-success">
                                        <i class="fas fa-play"></i>
                                        启动
                                    </button>
                                </div>
                                <div class="app-action-row">
                                    <button id="stopAppBtn" class="btn btn-danger">
                                        <i class="fas fa-stop"></i>
                                        停止
                                    </button>
                                </div>
                                <button id="listAppsBtn" class="btn btn-secondary full-width">
                                    <i class="fas fa-list"></i>
                                    获取应用列表
                                </button>
                                <div class="app-list" id="appList"></div>
                            </div>
                        </section>
                    </div>


                </div>
                <div class="swipe-dots" id="swipeDots">
                    <span class="swipe-dot active" data-dot="0"></span>
                    <span class="swipe-dot" data-dot="1"></span>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-content">
                <span>Android Remote Control</span>
                <span class="separator">|</span>
                <span>ADB命令转发</span>
            </div>
        </footer>
    </div>

    <div class="toast" id="toast"></div>
    <script src="i18n.js"></script>
    <script src="script.js"></script>
</body>
</html>
